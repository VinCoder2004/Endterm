<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS GEAR | Admin Dashboard</title>
    <style>
        :root { --primary: #00d4ff; --dark: #0a0a0f; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); display: flex; margin: 0; }
        .sidebar { width: 250px; height: 100vh; background: #15151e; padding: 20px; border-right: 1px solid #333; }
        .main { flex: 1; padding: 40px; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #333; color: white; border-radius: 4px; }
        button { background: var(--primary); color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚡ NEXUS GEAR</h2>
        <p>Admin Panel</p>
        <hr>
        <button onclick="showSection('add')">Add Product</button>
        <br><br>
        <button onclick="showSection('list')">Manage Products</button>
    </div>

    <div class="main">
        <!-- Add Product Section -->
        <div id="add-section">
            <h3>Add New Product</h3>
            <form id="add-form">
                <div class="form-group"><input type="text" id="name" placeholder="Product Name" required></div>
                <div class="form-group"><input type="text" id="team" placeholder="Team (e.g. ECHO)" required></div>
                <div class="form-group"><input type="number" id="price" placeholder="Price (₱)" required></div>
                <div class="form-group"><input type="text" id="img" placeholder="Image URL (ImgBB/Unsplash)" required></div>
                <div class="form-group"><textarea id="desc" placeholder="Description"></textarea></div>
                <button type="submit">🚀 Save Product</button>
            </form>
        </div>

        <!-- Manage Products Section -->
        <div id="list-section" style="display:none;">
            <h3>Product Inventory</h3>
            <table id="product-table">
                <thead><tr><th>Name</th><th>Team</th><th>Price</th><th>Action</th></tr></thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api/products';

        function showSection(section) {
            document.getElementById('add-section').style.display = section === 'add' ? 'block' : 'none';
            document.getElementById('list-section').style.display = section === 'list' ? 'block' : 'none';
            if(section === 'list') fetchInventory();
        }

        // --- FETCH PRODUCTS ---
        async function fetchInventory() {
            const res = await fetch(API_URL);
            const result = await res.json();
            const list = document.getElementById('product-list');
            list.innerHTML = result.data.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.team}</td>
                    <td>₱${p.price}</td>
                    <td><button style="background:red" onclick="deleteProduct('${p._id}')">Delete</button></td>
                </tr>
            `).join('');
        }

        // --- POST NEW PRODUCT ---
        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            const product = {
                name: document.getElementById('name').value,
                team: document.getElementById('team').value,
                price: document.getElementById('price').value,
                img: document.getElementById('img').value,
                desc: document.getElementById('desc').value
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            alert("Product Added!");
            e.target.reset();
        };

        async function deleteProduct(id) {
            if(confirm("Delete this item?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchInventory();
            }
        }
    </script>
</body>
</html>
